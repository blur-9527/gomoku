<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋对战 - 游戏中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
    }

    .room-id-display {
      background: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      color: #667eea;
      letter-spacing: 2px;
    }

    .back-btn {
      background: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      color: #667eea;
      font-weight: bold;
    }

    .back-btn:hover {
      background: #f0f0f0;
    }

    .game-container {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }

    .players-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .player {
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      transition: all 0.3s ease;
      min-width: 120px;
    }

    .player.black {
      background: #333;
      color: white;
    }

    .player.white {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #333;
    }

    .player.ready {
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
    }

    .player.current {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .player-color {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin: 0 auto 10px;
      border: 2px solid #666;
    }

    .player-color.black {
      background: #1a1a1a;
    }

    .player-color.white {
      background: white;
      border-color: #999;
    }

    .board-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      background: linear-gradient(145deg, #DEB887, #D2A679);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 
        inset 0 2px 10px rgba(0,0,0,0.3),
        0 4px 20px rgba(0,0,0,0.2);
      border: 3px solid #8B7355;
    }

    .cell {
      width: 26px;
      height: 26px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .cell::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 1px;
      background: rgba(0, 0, 0, 0.6);
    }

    .cell::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .cell.star-point::before,
    .cell.star-point::after {
      background: rgba(0, 0, 0, 0.8);
    }

    .cell.star-point::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #1a1a1a;
      border-radius: 50%;
      z-index: 1;
    }

    .cell.star-point::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .stone {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      transition: transform 0.15s ease;
    }

    .stone.black {
      background: radial-gradient(circle at 35% 35%, #5a5a5a, #1a1a1a);
      box-shadow: 
        2px 2px 4px rgba(0, 0, 0, 0.5),
        inset -2px -2px 4px rgba(255,255,255,0.1);
    }

    .stone.white {
      background: radial-gradient(circle at 35% 35%, #ffffff, #d0d0d0);
      box-shadow: 
        2px 2px 4px rgba(0, 0, 0, 0.3),
        inset -2px -2px 4px rgba(0,0,0,0.1);
      border: 1px solid #ccc;
    }

    .stone.last-move::after {
      content: '';
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff4444;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-ready {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
    }

    .btn-ready:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
    }

    .btn-ready:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-undo {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      color: white;
    }

    .btn-undo:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
    }

    .btn-undo:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-surrender {
      background: linear-gradient(135deg, #f44336, #da190b);
      color: white;
    }

    .btn-surrender:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
    }

    .btn-surrender:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-share {
      background: linear-gradient(135deg, #2196F3, #1976D2);
      color: white;
    }

    .btn-share:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(33, 150, 243, 0.4);
    }

    .status {
      text-align: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .status.waiting {
      color: #666;
    }

    .status.playing {
      color: #667eea;
    }

    .status.win {
      color: #4CAF50;
      font-size: 1.3rem;
    }

    .status.lose {
      color: #f44336;
      font-size: 1.3rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s ease;
      max-width: 320px;
      width: 90%;
    }

    .modal-overlay.show .modal {
      transform: scale(1);
    }

    .modal h3 {
      margin-bottom: 20px;
      color: #333;
      font-size: 1.4rem;
    }

    .modal p {
      margin-bottom: 25px;
      color: #666;
      font-size: 1rem;
    }

    .modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .modal-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
      min-width: 100px;
    }

    .modal-btn.accept {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
    }

    .modal-btn.reject {
      background: #f0f0f0;
      color: #333;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
    }

    .share-link {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      word-break: break-all;
      font-size: 0.9rem;
      color: #333;
    }

    .countdown {
      font-size: 4rem;
      font-weight: bold;
      color: #667eea;
      animation: countdown-pulse 1s ease-in-out;
    }

    @keyframes countdown-pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
    }

    @media (max-width: 500px) {
      .cell {
        width: 20px;
        height: 20px;
      }

      .stone {
        width: 16px;
        height: 16px;
      }

      .board {
        padding: 12px;
      }

      .player {
        padding: 10px;
        min-width: 100px;
      }

      .player-color {
        width: 25px;
        height: 25px;
      }

      .btn {
        padding: 8px 16px;
        font-size: 0.85rem;
      }

      .countdown {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="room-id-display" id="roomIdDisplay" style="cursor: pointer;" title="点击复制房间号"></div>
    <button class="back-btn" id="exitGameBtn">退出</button>
  </div>

  <div class="game-container">
    <div class="players-info">
      <div class="player black" id="playerBlack">
        <div class="player-color black"></div>
        <div class="player-name" id="playerBlackName">黑方</div>
        <div class="player-status" id="playerBlackStatus">等待中</div>
      </div>
      <div class="player white" id="playerWhite">
        <div class="player-color white"></div>
        <div class="player-name" id="playerWhiteName">白方</div>
        <div class="player-status" id="playerWhiteStatus">等待中</div>
      </div>
    </div>

    <div class="board-container">
      <div class="board" id="board"></div>
    </div>

    <div class="controls">
      <button class="btn btn-ready" id="readyBtn">准备</button>
      <button class="btn btn-share" id="shareBtn">分享邀请</button>
      <button class="btn btn-undo" id="undoBtn" disabled>悔棋</button>
      <button class="btn btn-surrender" id="surrenderBtn" disabled>投降</button>
    </div>

    <div class="status" id="status">等待对手加入...</div>
  </div>

  <div class="modal-overlay" id="undoModal">
    <div class="modal">
      <h3>对手请求悔棋</h3>
      <p>对手希望悔棋，是否同意？</p>
      <div class="modal-buttons">
        <button class="modal-btn accept" id="acceptUndo">同意</button>
        <button class="modal-btn reject" id="rejectUndo">拒绝</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="surrenderModal">
    <div class="modal">
      <h3>确认投降</h3>
      <p>确定要投降吗？投降后将直接判负。</p>
      <div class="modal-buttons">
        <button class="modal-btn accept" id="confirmSurrender">确定投降</button>
        <button class="modal-btn reject" id="cancelSurrender">取消</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="shareModal">
    <div class="modal">
      <h3>分享邀请链接</h3>
      <p>复制链接发给朋友，邀请对方加入对战！</p>
      <div class="share-link" id="shareLink"></div>
      <div class="modal-buttons">
        <button class="modal-btn accept" id="copyLink">复制链接</button>
        <button class="modal-btn reject" id="closeShare">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="countdownModal">
    <div class="modal">
      <h3>双方已准备！</h3>
      <p>游戏即将开始</p>
      <div class="countdown" id="countdown">3</div>
    </div>
  </div>

  <div class="modal-overlay" id="gameEndModal">
    <div class="modal">
      <h3 id="gameEndTitle"></h3>
      <p id="gameEndMessage"></p>
      <div class="modal-buttons">
        <button class="modal-btn accept" id="rematchBtn">再次对局</button>
        <button class="modal-btn reject" id="exitBtn">退出</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="opponentExitModal">
    <div class="modal">
      <h3>对手已退出</h3>
      <p>对手已选择退出，游戏结束。</p>
      <div class="modal-buttons">
        <button class="modal-btn accept" onclick="window.location.href='index.html'">返回主页</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmExitModal">
    <div class="modal">
      <h3>确认退出</h3>
      <p>确定要退出房间吗？退出后对手将收到通知。</p>
      <div class="modal-buttons">
        <button class="modal-btn accept" id="confirmExitBtn">确定退出</button>
        <button class="modal-btn reject" id="cancelExitBtn">取消</button>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const playerColor = urlParams.get('player') || 'black';
    
    let board = Array(15).fill(null).map(() => Array(15).fill(null));
    let currentPlayer = 'black';
    let myColor = playerColor;
    let gameStarted = false;
    let lastMove = null;
    let lastKnownHistoryLength = 0;
    let gameEnded = false;
    let rematchRequested = false;
    let opponentRematch = false;

    function isStarPoint(row, col) {
      const starPoints = [
        [3, 3], [3, 7], [3, 11],
        [7, 3], [7, 7], [7, 11],
        [11, 3], [11, 7], [11, 11]
      ];
      return starPoints.some(([r, c]) => r === row && c === col);
    }

    function getRoomData() {
      const data = localStorage.getItem(`gomoku_${roomId}`);
      return data ? JSON.parse(data) : null;
    }

    function saveRoomData(data) {
      localStorage.setItem(`gomoku_${roomId}`, JSON.stringify(data));
    }

    function initBoard() {
      const boardElement = document.getElementById('board');
      boardElement.innerHTML = '';
      
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 15; col++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          
          if (isStarPoint(row, col)) {
            cell.classList.add('star-point');
          }
          
          cell.dataset.row = row;
          cell.dataset.col = col;
          
          if (board[row][col]) {
            const stone = document.createElement('div');
            stone.className = `stone ${board[row][col]}`;
            if (lastMove && lastMove.row === row && lastMove.col === col) {
              stone.classList.add('last-move');
            }
            cell.appendChild(stone);
          }
          
          cell.addEventListener('click', handleCellClick);
          boardElement.appendChild(cell);
        }
      }
    }

    function checkWin(board, row, col, player) {
      const directions = [
        [0, 1],
        [1, 0],
        [1, 1],
        [1, -1]
      ];

      for (const [dx, dy] of directions) {
        let count = 1;
        
        for (let i = 1; i < 5; i++) {
          const newRow = row + dx * i;
          const newCol = col + dy * i;
          if (newRow >= 0 && newRow < 15 && newCol >= 0 && newCol < 15 && board[newRow][newCol] === player) {
            count++;
          } else {
            break;
          }
        }
        
        for (let i = 1; i < 5; i++) {
          const newRow = row - dx * i;
          const newCol = col - dy * i;
          if (newRow >= 0 && newRow < 15 && newCol >= 0 && newCol < 15 && board[newRow][newCol] === player) {
            count++;
          } else {
            break;
          }
        }
        
        if (count >= 5) return true;
      }
      return false;
    }

    function handleCellClick(e) {
      if (!gameStarted || gameEnded) return;
      
      const target = e.target;
      const cell = target.classList.contains('cell') ? target : target.parentElement;
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      
      if (isNaN(row) || isNaN(col)) return;
      if (board[row][col]) return;
      if (currentPlayer !== myColor) return;
      
      const roomData = getRoomData();
      if (!roomData) return;
      
      roomData.board[row][col] = currentPlayer;
      roomData.history.push({ row, col, player: currentPlayer });
      roomData.lastMove = { row, col };
      
      const isWin = checkWin(roomData.board, row, col, currentPlayer);
      
      if (isWin) {
        endGame(true, roomData);
      } else {
        roomData.currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
        currentPlayer = roomData.currentPlayer;
      }
      
      saveRoomData(roomData);
      updateBoard(roomData);
      updateCurrentPlayerDisplay();
    }

    function endGame(won, roomData) {
      gameEnded = true;
      roomData.gameEnded = true;
      
      if (won) {
        document.getElementById('status').className = 'status win';
        document.getElementById('status').textContent = '你获胜了！';
        roomData.winner = myColor;
      } else {
        document.getElementById('status').className = 'status lose';
        document.getElementById('status').textContent = '你输了！';
      }
      
      document.getElementById('undoBtn').disabled = true;
      document.getElementById('surrenderBtn').disabled = true;
      
      saveRoomData(roomData);
      
      const modal = document.getElementById('gameEndModal');
      document.getElementById('gameEndTitle').textContent = won ? '🎉 恭喜获胜！' : '😔 游戏结束';
      document.getElementById('gameEndMessage').textContent = won ? '你成功连成五子！' : '对手连成五子，你输了！';
      modal.classList.add('show');
    }

    function updatePlayersInfo(players) {
      players.forEach(player => {
        const playerElement = document.getElementById(`player${player.color.charAt(0).toUpperCase() + player.color.slice(1)}`);
        const statusElement = document.getElementById(`player${player.color.charAt(0).toUpperCase() + player.color.slice(1)}Status`);
        
        if (playerElement && statusElement) {
          if (player.ready) {
            playerElement.classList.add('ready');
            statusElement.textContent = '已准备';
          } else {
            playerElement.classList.remove('ready');
            statusElement.textContent = '等待中';
          }
          
          if (player.color === myColor) {
            document.getElementById('readyBtn').style.display = player.ready ? 'none' : 'block';
          }
        }
      });
    }

    function updateCurrentPlayerDisplay() {
      document.getElementById('playerBlack').classList.remove('current');
      document.getElementById('playerWhite').classList.remove('current');
      
      if (currentPlayer === 'black') {
        document.getElementById('playerBlack').classList.add('current');
      } else {
        document.getElementById('playerWhite').classList.add('current');
      }
      
      const status = document.getElementById('status');
      status.className = 'status playing';
      status.textContent = currentPlayer === myColor ? '你的回合' : '对手回合';
      
      document.getElementById('undoBtn').disabled = !gameStarted || board.every(row => row.every(cell => cell === null)) || gameEnded;
      document.getElementById('surrenderBtn').disabled = !gameStarted || gameEnded;
    }

    function updateBoard(roomData) {
      if (!roomData) return;
      
      board = roomData.board;
      lastMove = roomData.lastMove;
      
      const blackPlayer = roomData.players.find(p => p.color === 'black');
      const whitePlayer = roomData.players.find(p => p.color === 'white');
      
      if (blackPlayer && blackPlayer.ready) {
        document.getElementById('playerBlack').classList.add('ready');
        document.getElementById('playerBlackStatus').textContent = '已准备';
      }
      if (whitePlayer && whitePlayer.ready) {
        document.getElementById('playerWhite').classList.add('ready');
        document.getElementById('playerWhiteStatus').textContent = '已准备';
      }
      
      initBoard();
    }

    function startCountdown() {
      const modal = document.getElementById('countdownModal');
      const countdownEl = document.getElementById('countdown');
      modal.classList.add('show');
      
      let count = 3;
      countdownEl.textContent = count;
      
      const timer = setInterval(() => {
        count--;
        countdownEl.textContent = count;
        
        if (count <= 0) {
          clearInterval(timer);
          modal.classList.remove('show');
        }
      }, 1000);
    }

    function checkOpponentMove() {
      const roomData = getRoomData();
      if (!roomData) return;
      
      if (roomData.history.length > lastKnownHistoryLength) {
        const lastMoveData = roomData.history[roomData.history.length - 1];
        
        if (lastMoveData.player !== myColor) {
          board = roomData.board;
          lastMove = roomData.lastMove;
          currentPlayer = roomData.currentPlayer;
          lastKnownHistoryLength = roomData.history.length;
          
          if (checkWin(board, lastMove.row, lastMove.col, lastMove.player)) {
            endGame(false, roomData);
          } else {
            initBoard();
            updateCurrentPlayerDisplay();
          }
        }
      }
      
      if (roomData.pendingUndo && roomData.pendingUndo !== myColor) {
        document.getElementById('undoModal').classList.add('show');
      }
      
      if (roomData.surrendered && roomData.surrendered !== myColor) {
        endGame(true, roomData);
      }
      
      if (roomData.opponentExited) {
        document.getElementById('gameEndModal').classList.remove('show');
        document.getElementById('opponentExitModal').classList.add('show');
      }
      
      if (roomData.rematch && !rematchRequested) {
        opponentRematch = true;
        if (rematchRequested) {
          startNewGame();
        }
      }
    }

    function startNewGame() {
      const roomData = getRoomData();
      if (!roomData) return;
      
      roomData.board = Array(15).fill(null).map(() => Array(15).fill(null));
      roomData.currentPlayer = 'black';
      roomData.gameStarted = false;
      roomData.gameEnded = false;
      roomData.history = [];
      roomData.lastMove = null;
      roomData.pendingUndo = null;
      roomData.surrendered = null;
      roomData.rematch = false;
      roomData.opponentExited = false;
      roomData.players.forEach(p => p.ready = false);
      
      board = roomData.board;
      currentPlayer = 'black';
      gameStarted = false;
      gameEnded = false;
      lastMove = null;
      lastKnownHistoryLength = 0;
      rematchRequested = false;
      opponentRematch = false;
      
      document.getElementById('playerBlack').classList.remove('ready');
      document.getElementById('playerWhite').classList.remove('ready');
      document.getElementById('playerBlackStatus').textContent = '等待中';
      document.getElementById('playerWhiteStatus').textContent = '等待中';
      document.getElementById('status').textContent = '等待对手准备...';
      document.getElementById('readyBtn').style.display = 'block';
      document.getElementById('undoBtn').disabled = true;
      document.getElementById('surrenderBtn').disabled = true;
      
      saveRoomData(roomData);
      initBoard();
      
      startCountdown();
      
      setTimeout(() => {
        roomData.gameStarted = true;
        gameStarted = true;
        document.getElementById('status').className = 'status playing';
        document.getElementById('status').textContent = currentPlayer === myColor ? '你的回合' : '对手回合';
        document.getElementById('surrenderBtn').disabled = false;
        saveRoomData(roomData);
      }, 4000);
    }

    document.getElementById('readyBtn').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData) return;
      
      const player = roomData.players.find(p => p.color === myColor);
      if (player) {
        player.ready = true;
        
        if (roomData.players.length === 2 && roomData.players.every(p => p.ready)) {
          roomData.gameStarted = true;
          gameStarted = true;
          currentPlayer = roomData.currentPlayer;
          saveRoomData(roomData);
          
          startCountdown();
          
          setTimeout(() => {
            document.getElementById('status').className = 'status playing';
            document.getElementById('status').textContent = currentPlayer === myColor ? '你的回合' : '对手回合';
            document.getElementById('surrenderBtn').disabled = false;
          }, 4000);
        } else {
          document.getElementById('status').textContent = '等待对手准备...';
        }
        
        saveRoomData(roomData);
        document.getElementById('readyBtn').style.display = 'none';
        updatePlayersInfo(roomData.players);
      }
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      const shareUrl = `${window.location.origin}/game.html?room=${roomId}&player=${myColor === 'black' ? 'white' : 'black'}`;
      document.getElementById('shareLink').textContent = shareUrl;
      document.getElementById('shareModal').classList.add('show');
    });

    document.getElementById('copyLink').addEventListener('click', () => {
      const shareUrl = `${window.location.origin}/game.html?room=${roomId}&player=${myColor === 'black' ? 'white' : 'black'}`;
      navigator.clipboard.writeText(shareUrl).then(() => {
        alert('链接已复制到剪贴板');
        document.getElementById('shareModal').classList.remove('show');
      });
    });

    document.getElementById('closeShare').addEventListener('click', () => {
      document.getElementById('shareModal').classList.remove('show');
    });

    document.getElementById('roomIdDisplay').addEventListener('click', () => {
      navigator.clipboard.writeText(roomId).then(() => {
        alert('房间号已复制到剪贴板');
      });
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData || roomData.history.length < 2) return;
      
      roomData.pendingUndo = myColor;
      saveRoomData(roomData);
      alert('已发送悔棋请求，请等待对方确认');
    });

    document.getElementById('acceptUndo').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData || !roomData.pendingUndo) return;
      
      if (roomData.history.length >= 2) {
        const lastMove1 = roomData.history.pop();
        const lastMove2 = roomData.history.pop();
        
        roomData.board[lastMove1.row][lastMove1.col] = null;
        if (lastMove2) {
          roomData.board[lastMove2.row][lastMove2.col] = null;
        }
        
        roomData.lastMove = roomData.history.length > 0 ? roomData.history[roomData.history.length - 1] : null;
        roomData.currentPlayer = 'black';
        roomData.pendingUndo = null;
        
        board = roomData.board;
        lastMove = roomData.lastMove;
        currentPlayer = 'black';
        lastKnownHistoryLength = roomData.history.length;
        
        saveRoomData(roomData);
        initBoard();
        updateCurrentPlayerDisplay();
      }
      
      document.getElementById('undoModal').classList.remove('show');
    });

    document.getElementById('rejectUndo').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData) return;
      roomData.pendingUndo = null;
      saveRoomData(roomData);
      document.getElementById('undoModal').classList.remove('show');
    });

    document.getElementById('surrenderBtn').addEventListener('click', () => {
      document.getElementById('surrenderModal').classList.add('show');
    });

    document.getElementById('confirmSurrender').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData) return;
      
      roomData.surrendered = myColor;
      endGame(false, roomData);
      
      document.getElementById('surrenderModal').classList.remove('show');
    });

    document.getElementById('cancelSurrender').addEventListener('click', () => {
      document.getElementById('surrenderModal').classList.remove('show');
    });

    document.getElementById('rematchBtn').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData) return;
      
      if (roomData.opponentExited) {
        document.getElementById('gameEndModal').classList.remove('show');
        document.getElementById('opponentExitModal').classList.add('show');
        return;
      }
      
      rematchRequested = true;
      roomData.rematch = true;
      saveRoomData(roomData);
      
      document.getElementById('gameEndModal').querySelector('p').textContent = '等待对方同意再次对局...';
      
      if (opponentRematch) {
        document.getElementById('gameEndModal').classList.remove('show');
        startNewGame();
      }
    });

    document.getElementById('exitGameBtn').addEventListener('click', () => {
      document.getElementById('confirmExitModal').classList.add('show');
    });

    document.getElementById('confirmExitBtn').addEventListener('click', () => {
      const roomData = getRoomData();
      if (roomData) {
        roomData.opponentExited = true;
        saveRoomData(roomData);
      }
      
      document.getElementById('confirmExitModal').classList.remove('show');
      window.location.href = 'index.html';
    });

    document.getElementById('cancelExitBtn').addEventListener('click', () => {
      document.getElementById('confirmExitModal').classList.remove('show');
    });

    document.getElementById('exitBtn').addEventListener('click', () => {
      const roomData = getRoomData();
      if (!roomData) {
        window.location.href = 'index.html';
        return;
      }
      
      roomData.opponentExited = true;
      saveRoomData(roomData);
      
      window.location.href = 'index.html';
    });

    function initGame() {
      document.getElementById('roomIdDisplay').textContent = `房间号: ${roomId}`;
      
      let roomData = getRoomData();
      
      if (!roomData) {
        roomData = {
          players: [{ ready: false, color: 'black' }],
          board: Array(15).fill(null).map(() => Array(15).fill(null)),
          currentPlayer: 'black',
          gameStarted: false,
          gameEnded: false,
          history: [],
          lastMove: null,
          pendingUndo: null,
          surrendered: null,
          rematch: false,
          opponentExited: false
        };
        saveRoomData(roomData);
      }
      
      if (myColor === 'white') {
        const existingWhite = roomData.players.find(p => p.color === 'white');
        if (!existingWhite) {
          roomData.players.push({ ready: false, color: 'white' });
          saveRoomData(roomData);
          document.getElementById('status').textContent = '对手已加入，请准备';
        }
      }
      
      if (roomData.players.length === 1) {
        document.getElementById('status').textContent = '等待对手加入...';
      }
      
      updateBoard(roomData);
      lastKnownHistoryLength = roomData.history.length;
      
      setInterval(() => {
        const data = getRoomData();
        if (!data) return;
        
        const blackReady = data.players.find(p => p.color === 'black')?.ready;
        const whiteReady = data.players.find(p => p.color === 'white')?.ready;
        
        if (data.gameStarted && !gameStarted && !data.gameEnded) {
          startCountdown();
          
          setTimeout(() => {
            gameStarted = true;
            currentPlayer = data.currentPlayer;
            document.getElementById('surrenderBtn').disabled = false;
            document.getElementById('status').className = 'status playing';
            document.getElementById('status').textContent = currentPlayer === myColor ? '你的回合' : '对手回合';
            document.getElementById('readyBtn').style.display = 'none';
          }, 4000);
        }
        
        if (data.players.length === 2) {
          if (blackReady) {
            document.getElementById('playerBlack').classList.add('ready');
            document.getElementById('playerBlackStatus').textContent = '已准备';
          }
          if (whiteReady) {
            document.getElementById('playerWhite').classList.add('ready');
            document.getElementById('playerWhiteStatus').textContent = '已准备';
          }
          
          if (blackReady && whiteReady && !gameStarted && !data.gameEnded) {
            data.gameStarted = true;
            saveRoomData(data);
            
            startCountdown();
            
            setTimeout(() => {
              gameStarted = true;
              currentPlayer = data.currentPlayer;
              document.getElementById('status').className = 'status playing';
              document.getElementById('status').textContent = currentPlayer === myColor ? '你的回合' : '对手回合';
              document.getElementById('surrenderBtn').disabled = false;
            }, 4000);
          }
        }
        
        if (data.gameEnded && !gameEnded) {
          gameEnded = true;
          document.getElementById('undoBtn').disabled = true;
          document.getElementById('surrenderBtn').disabled = true;
          
          const won = data.winner === myColor;
          document.getElementById('status').className = won ? 'status win' : 'status lose';
          document.getElementById('status').textContent = won ? '你获胜了！' : '你输了！';
          
          const modal = document.getElementById('gameEndModal');
          document.getElementById('gameEndTitle').textContent = won ? '🎉 恭喜获胜！' : '😔 游戏结束';
          document.getElementById('gameEndMessage').textContent = won ? '你成功连成五子！' : '对手连成五子，你输了！';
          modal.classList.add('show');
        }
        
        checkOpponentMove();
      }, 500);
    }

    initGame();
  </script>
</body>
</html>
